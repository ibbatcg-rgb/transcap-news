name: Fetch Inoreader News

on:
  schedule:
    # Hourly fetch — 1 página normalmente, 5 páginas às 09:00 UTC (06:00 BR)
    # pra Pedro ter as últimas 24h completas quando olhar de manhã.
    # Inoreader free tier: 100 calls/dia. Conta: 23×2 + 1×6 = 52 calls/dia (52%).
    - cron: '0 * * * *'
  # Permite acionar manualmente. Default = 5 páginas (light deep).
  workflow_dispatch:
    inputs:
      pages:
        description: 'Quantas páginas buscar (1-30). Cada página custa 1 call.'
        default: '5'
        required: false
  # Roda em push de yml/index, mas com fetch mínimo (1 página) pra não gastar quota.
  push:
    branches: [main]
    paths-ignore:
      - 'news.json'

permissions:
  contents: write
  actions: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Install googlenewsdecoder
        run: pip install --quiet googlenewsdecoder

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Fetch articles with smart pagination
        env:
          INO_APP_ID: ${{ secrets.INOREADER_APP_ID }}
          INO_APP_KEY: ${{ secrets.INOREADER_APP_KEY }}
          INO_REFRESH_TOKEN: ${{ vars.INOREADER_REFRESH_TOKEN }}
          INO_FOLDER: ${{ secrets.INOREADER_FOLDER }}
          # PAT pessoal com Variables: write (Phase 2)
          # Cai pra GITHUB_TOKEN se GH_PAT não estiver definido (fallback)
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Indica qual cron disparou (vazio se for workflow_dispatch ou push)
          CRON_SCHEDULE: ${{ github.event.schedule }}
          TRIGGER_EVENT: ${{ github.event_name }}
          # Páginas escolhidas no workflow_dispatch (default 5 se rodar manual)
          DISPATCH_PAGES: ${{ inputs.pages }}
        run: |
          python3 <<'PY'
          import os, json, time, urllib.parse, urllib.request, urllib.error, datetime, sys, traceback, re
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from html import unescape
          try:
              from googlenewsdecoder import gnewsdecoder
              GNEWS_DECODER_AVAILABLE = True
          except ImportError:
              GNEWS_DECODER_AVAILABLE = False
              print("::warning::googlenewsdecoder not installed — URLs Google News não serão resolvidas")

          APP_ID = os.environ['INO_APP_ID']
          APP_KEY = os.environ['INO_APP_KEY']
          REFRESH_TOKEN = os.environ['INO_REFRESH_TOKEN']
          FOLDER = os.environ.get('INO_FOLDER', 'TransCap')
          # GH_PAT preferido (tem Variables: write); GH_TOKEN como fallback
          GH_PAT = os.environ.get('GH_PAT', '').strip()
          GH_TOKEN = os.environ.get('GH_TOKEN', '').strip()
          ROTATION_TOKEN = GH_PAT if GH_PAT else GH_TOKEN
          ROTATION_SOURCE = 'GH_PAT (Phase 2)' if GH_PAT else 'GITHUB_TOKEN (fallback)'
          GH_REPO = os.environ.get('GH_REPO', '')
          MAX_AGE_DAYS = 7
          PAGE_SIZE = 100
          # MAX_PAGES adaptativo baseado no contexto (Inoreader free = 100 calls/dia):
          # - workflow_dispatch (manual): usa input "pages" (default 5)
          # - push: 1 página (mínimo, evita queimar quota em edições)
          # - schedule:
          #     - 09:00 UTC (06:00 BR, pré-briefing matinal): 5 páginas
          #     - outras horas: 1 página
          CRON_SCHEDULE = os.environ.get('CRON_SCHEDULE', '')
          TRIGGER_EVENT = os.environ.get('TRIGGER_EVENT', '')
          DISPATCH_PAGES = os.environ.get('DISPATCH_PAGES', '').strip()
          now_hour_utc = datetime.datetime.utcnow().hour

          if TRIGGER_EVENT == 'workflow_dispatch':
              try:
                  MAX_PAGES = max(1, min(30, int(DISPATCH_PAGES or '5')))
              except ValueError:
                  MAX_PAGES = 5
              RUN_MODE = f'manual-{MAX_PAGES}p'
          elif TRIGGER_EVENT == 'push':
              MAX_PAGES = 1
              RUN_MODE = 'push-light'
          elif now_hour_utc == 9:
              MAX_PAGES = 5
              RUN_MODE = 'morning-briefing'
          else:
              MAX_PAGES = 1
              RUN_MODE = 'hourly-light'

          # Diagnóstico que vai pro news.json se algo der errado
          debug_info = {
              'rotation_source': ROTATION_SOURCE,
              'run_mode': RUN_MODE,
              'max_pages': MAX_PAGES,
              'trigger_event': TRIGGER_EVENT,
              'cron_schedule': CRON_SCHEDULE,
              'token_refresh_status': None,
              'rotation_status': None,
              'first_fetch_status': None,
              'last_error': None,
          }

          cutoff = time.time() - MAX_AGE_DAYS * 86400
          print(f"Cutoff: {datetime.datetime.utcfromtimestamp(cutoff).isoformat()}Z (7 days ago)")
          print(f"Run mode: {RUN_MODE} ({MAX_PAGES} pages)")
          print(f"Rotation will use: {ROTATION_SOURCE}")

          # 1) Refresh access_token
          print("::group::Refreshing access token")
          ACCESS_TOKEN = None
          NEW_REFRESH_TOKEN = ''
          try:
              token_body = urllib.parse.urlencode({
                  'client_id': APP_ID,
                  'client_secret': APP_KEY,
                  'refresh_token': REFRESH_TOKEN,
                  'grant_type': 'refresh_token',
              }).encode()
              req = urllib.request.Request(
                  'https://www.inoreader.com/oauth2/token',
                  data=token_body,
                  headers={'Content-Type': 'application/x-www-form-urlencoded'},
              )
              with urllib.request.urlopen(req, timeout=20) as r:
                  token_data = json.loads(r.read())
                  debug_info['token_refresh_status'] = f"HTTP {r.status}"
              ACCESS_TOKEN = token_data.get('access_token')
              NEW_REFRESH_TOKEN = token_data.get('refresh_token', '')
              if ACCESS_TOKEN:
                  print(f"Token refreshed OK. access_token prefix: {ACCESS_TOKEN[:8]}…")
                  print(f"New refresh_token received: {'yes' if NEW_REFRESH_TOKEN else 'no'}")
              else:
                  debug_info['last_error'] = f"Token refresh returned no access_token: {token_data}"
                  print(f"::error::{debug_info['last_error']}")
          except urllib.error.HTTPError as e:
              body = ''
              try: body = e.read()[:500].decode('utf-8', errors='replace')
              except: pass
              debug_info['token_refresh_status'] = f"HTTP {e.code} {e.reason}"
              debug_info['last_error'] = f"Token refresh failed: HTTP {e.code} {e.reason} body={body}"
              print(f"::error::{debug_info['last_error']}")
          except Exception as e:
              debug_info['token_refresh_status'] = 'exception'
              debug_info['last_error'] = f"Token refresh exception: {type(e).__name__}: {e}"
              print(f"::error::{debug_info['last_error']}")
          print("::endgroup::")

          # Auto-rotate refresh token
          if ACCESS_TOKEN and NEW_REFRESH_TOKEN and NEW_REFRESH_TOKEN != REFRESH_TOKEN and ROTATION_TOKEN and GH_REPO:
              print(f"::group::Rotating refresh token via {ROTATION_SOURCE}")
              try:
                  payload = json.dumps({'value': NEW_REFRESH_TOKEN}).encode()
                  rot_req = urllib.request.Request(
                      f'https://api.github.com/repos/{GH_REPO}/actions/variables/INOREADER_REFRESH_TOKEN',
                      data=payload,
                      headers={
                          'Authorization': f'Bearer {ROTATION_TOKEN}',
                          'Content-Type': 'application/json',
                          'Accept': 'application/vnd.github+json',
                          'X-GitHub-Api-Version': '2022-11-28',
                      },
                      method='PATCH'
                  )
                  with urllib.request.urlopen(rot_req, timeout=10) as r:
                      debug_info['rotation_status'] = f"HTTP {r.status} OK"
                      print(f"✅ Refresh token rotated: HTTP {r.status}")
              except urllib.error.HTTPError as e:
                  body = ''
                  try: body = e.read()[:500].decode('utf-8', errors='replace')
                  except: pass
                  debug_info['rotation_status'] = f"HTTP {e.code} FAILED"
                  debug_info['last_error'] = (debug_info['last_error'] or '') + f" | Rotation failed: HTTP {e.code} {e.reason} body={body}"
                  print(f"::warning::Rotation failed: HTTP {e.code} {e.reason}")
                  print(f"Body: {body}")
              except Exception as e:
                  debug_info['rotation_status'] = 'exception'
                  debug_info['last_error'] = (debug_info['last_error'] or '') + f" | Rotation exception: {type(e).__name__}: {e}"
                  print(f"::warning::Rotation exception: {e}")
              print("::endgroup::")
          else:
              if not ACCESS_TOKEN:
                  debug_info['rotation_status'] = 'skipped (no access token)'
              elif not NEW_REFRESH_TOKEN:
                  debug_info['rotation_status'] = 'skipped (no new refresh token)'
              elif NEW_REFRESH_TOKEN == REFRESH_TOKEN:
                  debug_info['rotation_status'] = 'skipped (token unchanged)'
              else:
                  debug_info['rotation_status'] = 'skipped (missing repo/token)'
              print(f"Rotation skipped: {debug_info['rotation_status']}")

          # 2) Fetch articles with pagination (only if we have access_token)
          all_items = []
          seen_ids = set()
          continuation = None
          pages_fetched = 0
          dropped_old = 0
          dropped_dup = 0
          consecutive_old_pages = 0

          if ACCESS_TOKEN:
              folder_enc = urllib.parse.quote(FOLDER)
              base_url = f"https://www.inoreader.com/reader/api/0/stream/contents/user/-/label/{folder_enc}"

              for page in range(MAX_PAGES):
                  params = {'n': str(PAGE_SIZE), 'output': 'json'}
                  if continuation:
                      params['c'] = continuation
                  url = base_url + '?' + urllib.parse.urlencode(params)

                  print(f"::group::Page {page+1}: fetching {PAGE_SIZE} items"
                        + (f" (cont: {continuation[:20]}…)" if continuation else ""))
                  req = urllib.request.Request(url, headers={
                      'Authorization': f'Bearer {ACCESS_TOKEN}',
                      'AppId': APP_ID,
                      'AppKey': APP_KEY,
                  })
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          page_data = json.loads(r.read())
                          if page == 0:
                              debug_info['first_fetch_status'] = f"HTTP {r.status} OK"
                              # Captura headers de rate limit (Zone 1) — útil pra monitorar
                              # quanto da cota já queimamos no dia
                              headers = r.headers
                              z1_limit = headers.get('X-Reader-Zone1-Limit')
                              z1_usage = headers.get('X-Reader-Zone1-Usage')
                              reset_after = headers.get('X-Reader-Limits-Reset-After')
                              if z1_limit and z1_usage:
                                  debug_info['quota_zone1'] = f"{z1_usage}/{z1_limit}"
                                  try:
                                      pct = 100.0 * int(z1_usage) / max(1, int(z1_limit))
                                      debug_info['quota_zone1_pct'] = round(pct, 1)
                                  except: pass
                              if reset_after:
                                  try:
                                      mins = int(reset_after) // 60
                                      debug_info['quota_reset_in_min'] = mins
                                  except: pass
                  except urllib.error.HTTPError as e:
                      body = ''
                      try: body = e.read()[:500].decode('utf-8', errors='replace')
                      except: pass
                      msg = f"API error: HTTP {e.code} {e.reason} body={body}"
                      if page == 0:
                          debug_info['first_fetch_status'] = f"HTTP {e.code} FAILED"
                          debug_info['last_error'] = (debug_info['last_error'] or '') + f" | First fetch: {msg}"
                      print(f"::error::{msg}")
                      break
                  except Exception as e:
                      msg = f"Unexpected fetch error: {type(e).__name__}: {e}"
                      if page == 0:
                          debug_info['first_fetch_status'] = 'exception'
                          debug_info['last_error'] = (debug_info['last_error'] or '') + f" | First fetch: {msg}"
                      print(f"::error::{msg}")
                      break

                  items = page_data.get('items', [])
                  continuation = page_data.get('continuation')
                  pages_fetched += 1

                  pub_times = [it.get('published') or 0 for it in items if it.get('published')]
                  if pub_times:
                      newest = max(pub_times)
                      oldest = min(pub_times)
                      print(f"  Got {len(items)} items. Newest: "
                            f"{datetime.datetime.utcfromtimestamp(newest).isoformat()}Z, "
                            f"oldest: {datetime.datetime.utcfromtimestamp(oldest).isoformat()}Z")
                  else:
                      oldest = 0
                      print(f"  Got {len(items)} items (no published dates).")

                  page_kept = 0
                  for it in items:
                      item_id = it.get('id')
                      if not item_id or item_id in seen_ids:
                          dropped_dup += 1
                          continue
                      pub = it.get('published') or 0
                      if pub < cutoff:
                          dropped_old += 1
                          continue
                      seen_ids.add(item_id)
                      all_items.append(it)
                      page_kept += 1
                  print(f"  Kept {page_kept} fresh items (total: {len(all_items)})")
                  print("::endgroup::")

                  if not continuation:
                      print("No continuation token — end of stream")
                      break

                  if pub_times and oldest < cutoff and page_kept == 0:
                      consecutive_old_pages += 1
                      if consecutive_old_pages >= 2:
                          print("2 páginas consecutivas sem novidades — stopping")
                          break
                  else:
                      consecutive_old_pages = 0
          else:
              print("::warning::Skipping fetch because access_token is missing")

          # 3) Slim items + sort + write news.json (always writes, even on error)
          print("::group::Building news.json")
          print(f"Total kept: {len(all_items)} | dropped old: {dropped_old} | dup: {dropped_dup} | pages: {pages_fetched}")

          slim = []
          for it in all_items:
              slim.append({
                  'id': it.get('id'),
                  'title': (it.get('title') or '').strip(),
                  'published': it.get('published') or 0,
                  'updated': it.get('updated'),
                  'canonical': it.get('canonical'),
                  'alternate': it.get('alternate'),
                  'origin': {
                      'streamId': (it.get('origin') or {}).get('streamId'),
                      'title': (it.get('origin') or {}).get('title'),
                  },
                  'summary': {
                      'content': ((it.get('summary') or {}).get('content') or '')[:400]
                  } if it.get('summary') else None,
              })

          slim.sort(key=lambda x: x.get('published') or 0, reverse=True)
          print("::endgroup::")

          # Carrega news.json existente (usado tanto pelo cache de URLs quanto pelo merge logic)
          existing_items = []
          existing_fetched_at = None
          try:
              with open('news.json', 'r', encoding='utf-8') as f:
                  existing = json.load(f)
                  existing_items = existing.get('items', [])
                  existing_fetched_at = existing.get('_fetched_at')
          except Exception:
              pass

          # 3.5) Resolve Google News URLs to publisher URLs (com cache do news.json anterior)
          print("::group::Resolving Google News URLs")

          def get_gnews_link(item):
              """Retorna a href atual se for Google News, senão None."""
              c = (item.get('canonical') or [{}])[0].get('href') or ''
              return c if 'news.google.com' in c else None

          def resolve_gnews_url(gnews_url):
              """Resolve URL Google News pra publisher real usando googlenewsdecoder.
              Retorna URL original em caso de falha."""
              if not GNEWS_DECODER_AVAILABLE:
                  return gnews_url
              try:
                  result = gnewsdecoder(gnews_url, interval=1)
                  if result.get('status') and result.get('decoded_url'):
                      return result['decoded_url']
                  err = result.get('message', 'no decoded_url')
                  # Log apenas o que importa, não o URL inteiro
                  print(f"  resolve fail (no decode): {err[:60]}")
              except Exception as e:
                  print(f"  resolve fail ({type(e).__name__}): {str(e)[:60]}")
              return gnews_url  # Fallback

          # Cache: id → resolved_link já presente no news.json anterior
          resolved_cache = {}
          for it in existing_items:
              link = (it.get('canonical') or [{}])[0].get('href') or ''
              if link and 'news.google.com' not in link:
                  # Já foi resolvido em run anterior — guarda
                  resolved_cache[it.get('id')] = link

          # Coleta IDs que precisam resolver (Google News e ainda não no cache).
          # Inclui tanto items novos (slim) quanto items antigos (existing_items)
          # que ainda estão com URL Google News — backfill incremental.
          to_resolve = []
          seen_ids = set()
          # Limite para não estourar tempo do workflow (Google retorna ~1s por URL)
          MAX_BACKFILL_PER_RUN = 200
          for it in slim:
              gnews = get_gnews_link(it)
              if gnews and it.get('id') not in resolved_cache and it.get('id') not in seen_ids:
                  to_resolve.append((it.get('id'), gnews))
                  seen_ids.add(it.get('id'))
          backfill_count = 0
          for it in existing_items:
              if backfill_count >= MAX_BACKFILL_PER_RUN:
                  break
              gnews = get_gnews_link(it)
              if gnews and it.get('id') not in resolved_cache and it.get('id') not in seen_ids:
                  to_resolve.append((it.get('id'), gnews))
                  seen_ids.add(it.get('id'))
                  backfill_count += 1
          print(f"Backfill: {backfill_count} URLs antigas do histórico (limit {MAX_BACKFILL_PER_RUN})")

          print(f"Cache hits: {sum(1 for it in slim if get_gnews_link(it) and it.get('id') in resolved_cache)}")
          print(f"To resolve: {len(to_resolve)}")

          if to_resolve:
              t0 = time.time()
              with ThreadPoolExecutor(max_workers=10) as pool:
                  futures = {pool.submit(resolve_gnews_url, url): item_id for item_id, url in to_resolve}
                  for fut in as_completed(futures):
                      item_id = futures[fut]
                      try:
                          resolved_cache[item_id] = fut.result()
                      except Exception as e:
                          print(f"  exception for {item_id}: {e}")
              print(f"Resolved {len(to_resolve)} URLs in {time.time()-t0:.1f}s")

          # Aplica as URLs resolvidas — tanto em slim quanto em existing_items
          # (assim items antigos do histórico também ganham URLs publishers)
          def apply_resolution(item):
              gnews = get_gnews_link(item)
              if gnews and resolved_cache.get(item.get('id')):
                  new_link = resolved_cache[item.get('id')]
                  if new_link != gnews:
                      item['canonical'] = [{'href': new_link}]
                      item['_original_gnews_url'] = gnews
                      return True
              return False

          replaced_new = sum(1 for it in slim if apply_resolution(it))
          replaced_old = sum(1 for it in existing_items if apply_resolution(it))
          replaced = replaced_new + replaced_old
          print(f"Replaced {replaced_new} (new) + {replaced_old} (history) = {replaced} Google News URLs")
          debug_info['gnews_resolved'] = replaced
          debug_info['gnews_resolved_new'] = replaced_new
          debug_info['gnews_resolved_history'] = replaced_old
          debug_info['gnews_to_resolve'] = len(to_resolve)

          # Estratégia de merge SEMPRE — preserva histórico:
          # - 0 items pegos: preserva os anteriores (falha no fetch)
          # - >0 items pegos: MERGE com existing (novos têm prioridade, antigos dentro de 7d preservados)
          # Isso garante que nada some entre fetches — só sai do news.json quando passa do MAX_AGE_DAYS.
          final_items = slim
          preserved = False
          merged_count = 0
          if len(slim) == 0 and len(existing_items) > 0:
              final_items = existing_items
              preserved = True
              print(f"::warning::Esta execução não pegou items. Preservando {len(existing_items)} items do news.json anterior.")
          elif len(slim) > 0 and len(existing_items) > 0:
              # Merge: items novos + items antigos que não estão na lista nova
              new_ids = {it.get('id') for it in slim}
              # Filtra antigos que ainda estão dentro da janela (cutoff de 7d)
              fresh_old = [it for it in existing_items
                           if it.get('id') not in new_ids
                           and (it.get('published') or 0) >= cutoff]
              final_items = slim + fresh_old
              # Reordena por data (mais recentes primeiro)
              final_items.sort(key=lambda x: x.get('published') or 0, reverse=True)
              merged_count = len(fresh_old)
              print(f"Merge ({RUN_MODE}): {len(slim)} new + {merged_count} preserved = {len(final_items)} total")

          out = {
              '_fetched_at': datetime.datetime.utcnow().isoformat() + 'Z',
              '_folder': FOLDER,
              '_count': len(final_items),
              '_max_age_days': MAX_AGE_DAYS,
              '_pages_fetched': pages_fetched,
              '_dropped_old': dropped_old,
              '_dropped_dup': dropped_dup,
              '_preserved_from_previous': preserved,
              '_previous_fetched_at': existing_fetched_at if preserved else None,
              '_run_mode': RUN_MODE,
              '_new_items_this_run': len(slim),
              '_merged_from_previous': merged_count,
              '_debug': debug_info,
              'items': final_items,
          }
          with open('news.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, separators=(',', ':'))
          print(f"Wrote {len(final_items)} items to news.json (debug: {debug_info})")
          print("::endgroup::")
          PY

          ls -la news.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update news.json ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
