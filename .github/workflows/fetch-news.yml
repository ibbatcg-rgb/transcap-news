name: Fetch Inoreader News

on:
  schedule:
    # A cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:  # permite rodar manualmente em Actions > Run workflow

permissions:
  contents: write  # necessário para commitar news.json

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Refresh access_token & fetch articles
        env:
          INO_APP_ID: ${{ secrets.INOREADER_APP_ID }}
          INO_APP_KEY: ${{ secrets.INOREADER_APP_KEY }}
          INO_REFRESH_TOKEN: ${{ secrets.INOREADER_REFRESH_TOKEN }}
          INO_FOLDER: ${{ secrets.INOREADER_FOLDER }}
        run: |
          set -euo pipefail

          FOLDER="${INO_FOLDER:-TransCap}"

          echo "::group::Refreshing access token"
          TOKEN_RESPONSE=$(curl -fsS -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${INO_APP_ID}" \
            -d "client_secret=${INO_APP_KEY}" \
            -d "refresh_token=${INO_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" \
            "https://www.inoreader.com/oauth2/token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: empty access_token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi
          echo "Token refreshed OK"
          echo "::endgroup::"

          echo "::group::Fetching articles from folder '$FOLDER'"
          FOLDER_ENC=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$FOLDER")

          curl -fsS -G \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "AppId: ${INO_APP_ID}" \
            -H "AppKey: ${INO_APP_KEY}" \
            --data-urlencode "n=500" \
            --data-urlencode "output=json" \
            "https://www.inoreader.com/reader/api/0/stream/contents/user/-/label/${FOLDER_ENC}" \
            > news_raw.json

          python3 <<'PY'
          import json, datetime, os
          with open('news_raw.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          slim_items = []
          for it in data.get('items', []):
              slim_items.append({
                  'id': it.get('id'),
                  'title': it.get('title', '').strip(),
                  'published': it.get('published'),
                  'updated': it.get('updated'),
                  'canonical': it.get('canonical'),
                  'alternate': it.get('alternate'),
                  'origin': {
                      'streamId': (it.get('origin') or {}).get('streamId'),
                      'title': (it.get('origin') or {}).get('title'),
                  },
                  'summary': {
                      'content': ((it.get('summary') or {}).get('content') or '')[:400]
                  } if it.get('summary') else None,
              })

          out = {
              '_fetched_at': datetime.datetime.utcnow().isoformat() + 'Z',
              '_folder': os.environ.get('INO_FOLDER', 'TransCap'),
              '_count': len(slim_items),
              'items': slim_items,
          }
          with open('news.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, separators=(',', ':'))
          print(f"Wrote {len(slim_items)} items to news.json")
          PY

          rm -f news_raw.json
          ls -la news.json
          echo "::endgroup::"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update news.json ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
