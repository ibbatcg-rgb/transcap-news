function detectSource(link) {
  try {
    const hostname = new URL(link).hostname;
    for (const s of SOURCE_MAP) {
      if (hostname.includes(s.domain)) return s;
    }
  } catch(_) {}
  return { name: 'Inoreader', short: 'Outros', color: '#95a5a6' };
}

function classifySectors(text) {
  const lower = text.toLowerCase();
  const matched = [];
  for (const s of SECTORS) {
    for (const kw of s.keywords) {
      if (lower.includes(kw.toLowerCase())) {
        matched.push(s.id);
        break;
      }
    }
  }
  return matched;
}

const HISTORY_KEY = 'transcap_history_v1';

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw).map(a => ({ ...a, pubDate: new Date(a.pubDate) }));
  } catch { return []; }
}

function saveHistory(articles) {
  try {
    const cutoff = Date.now() - CONFIG.historyDays * 86400000;
    const toSave = articles
      .filter(a => a.pubDate.getTime() > cutoff)
      .map(a => ({ ...a, pubDate: a.pubDate.toISOString() }));
    localStorage.setItem(HISTORY_KEY, JSON.stringify(toSave));
  } catch (e) { console.warn('localStorage:', e); }
}

function mergeArticles(existing, fresh) {
  const seen = new Set(existing.map(a => a.title.toLowerCase().slice(0, 60)));
  const newOnes = fresh.filter(a => {
    const key = a.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  return [...existing, ...newOnes].sort((a, b) => b.pubDate - a.pubDate);
}

const INO_API    = 'https://www.inoreader.com/reader/api/0';
const INO_TOKEN_KEY = 'ino_access_token';

function getRedirectUri() {
  return window.location.href.split('#')[0].split('?')[0];
}

function checkOAuthCallback() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token')) return null;
  const params = new URLSearchParams(hash.slice(1));
  const token  = params.get('access_token');
  if (token) {
    localStorage.setItem(INO_TOKEN_KEY, token);
    history.replaceState(null, '', window.location.pathname);
    return token;
  }
  return null;
}

function getToken() {
  return checkOAuthCallback() || localStorage.getItem(INO_TOKEN_KEY);
}

function handleInoClick() {
  if (getToken()) {
    if (confirm('Desconectar do Inoreader?')) {
      localStorage.removeItem(INO_TOKEN_KEY);
      location.reload();
    }
  } else {
    const authUrl = 'https://www.inoreader.com/oauth2/auth?' +
      `client_id=${CONFIG.appId}` +
      `&redirect_uri=${encodeURIComponent(getRedirectUri())}` +
      `&response_type=token&scope=read`;
    window.location.href = authUrl;
  }
}

function updateInoButton() {
  const btn = document.getElementById('ino-btn');
  if (!btn) return;
  if (getToken()) {
    btn.textContent  = '芒聹聟 Inoreader conectado';
    btn.style.color  = '#4ade80';
    btn.style.borderColor = '#4ade80';
  } else {
    btn.textContent = '芒職隆 Conectar Inoreader';
    btn.style.color = '';
    btn.style.borderColor = '';
  }
}

   FETCH 芒聙聰 Inoreader API (autenticado) 芒聠聮 fallback rss2json
   芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬 */

async function fetchFromInoreaderAPI(token) {
  const url = `${INO_API}/stream/contents/user/-/label/${encodeURIComponent(CONFIG.inoreaderFolder)}` +
              `?n=${CONFIG.articlesPerLoad}&output=json`;
  const res = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${token}`,
      'AppId':  CONFIG.appId,
      'AppKey': CONFIG.appKey,
    },
    signal: AbortSignal.timeout(20000),
  });
  if (res.status === 401) {
    localStorage.removeItem(INO_TOKEN_KEY);
    throw new Error('Token expirado 芒聙聰 clique em "Conectar Inoreader" novamente.');
  }
  if (!res.ok) throw new Error(`Inoreader API: ${res.status}`);
  const data = await res.json();
  if (!data.items) throw new Error('Resposta vazia da API do Inoreader');

  return data.items
    .map(item => {
      const link  = item.canonical?.[0]?.href || item.alternate?.[0]?.href || '#';
      const src   = detectSource(link);
      const title = (item.title || '').trim().replace(/\s+/g, ' ');
      const desc  = item.summary?.content || item.content?.content || '';
      return {
        title,
        link,
        pubDate:     new Date((item.published || 0) * 1000),
        sourceName:  src.name,
        sourceShort: src.short,
        sourceColor: src.color,
        sectors:     classifySectors(title + ' ' + desc),
      };
    })
    .filter(a => a.title.length > 5);
}

/* Fallback: 7 feeds via rss2json (sem login) */
const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

async function fetchOneFeed(source) {
  const apiUrl = RSS2JSON + encodeURIComponent(source.rssUrl) + '&count=20';
  const res    = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
  const data   = await res.json();
  if (data.status !== 'ok' || !Array.isArray(data.items)) return [];
  return data.items
    .filter(item => item.title && item.title.trim().length > 5)
    .map(item => ({
      title:       (item.title || '').trim().replace(/\s+/g, ' '),
      link:        item.link || item.guid || '#',
      pubDate:     new Date(item.pubDate || item.published || Date.now()),
      sourceName:  source.name,
      sourceShort: source.short,
      sourceColor: source.color,
      sectors:     classifySectors((item.title || '') + ' ' + (item.description || '')),
    }));
}

async function fetchAllFeeds() {
  const results = await Promise.allSettled(SOURCE_MAP.map(s => fetchOneFeed(s)));
  return results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value);
}

   芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬 */
function renderNews() {
  const container = document.getElementById('main-content');
  const searchVal = document.getElementById('search-input').value.toLowerCase();
  const periodArticles = getFilteredArticles();

  if (allArticles.length === 0) {
    container.innerHTML = `
      <div class="status-box">
        <div class="icon">冒聼聵露</div>
        <div>Nenhuma not脙颅cia encontrada. Verifique sua conex脙拢o e tente novamente.</div>
      </div>`;
    return;
  }

  if (periodArticles.length === 0) {
    container.innerHTML = `
      <div class="status-box">
        <div class="icon">冒聼聯聟</div>
        <div>Sem not脙颅cias nesse per脙颅odo. Tente selecionar "Tudo" ou aguarde mais atualiza脙搂脙碌es.</div>
      </div>`;
    return;
  }

  let html = '';

  if (currentSector === 'all') {
    for (const sector of SECTORS) {
      html += renderSectorSection(sector, searchVal, false, null, periodArticles);
    }
    const others = periodArticles.filter(a => a.sectors.length === 0);
    if (others.length > 0) {
      html += renderSectorSection(
        { id: 'other', name: 'Outros / Macro', emoji: '冒聼聦聬', color: '#95a5a6' },
        searchVal, false, others, periodArticles
      );
    }
  } else {
    const sector = SECTORS.find(s => s.id === currentSector);
    html += renderSectorSection(sector, searchVal, true, null, periodArticles);
  }

  container.innerHTML = html || `<div class="status-box"><div class="icon">冒聼聰聧</div><div>Sem resultados para "${searchVal}".</div></div>`;
}

function renderSectorSection(sector, searchVal, forceShow, overrideArticles, periodArticles) {
  const pool = periodArticles || getFilteredArticles();
  const articles = overrideArticles || pool.filter(a =>
    sector.id === 'other' ? a.sectors.length === 0 : a.sectors.includes(sector.id)
  );

  const filtered = searchVal
    ? articles.filter(a => a.title.toLowerCase().includes(searchVal))
    : articles;

  if (filtered.length === 0 && !forceShow) return '';

  let itemsHtml = filtered.length === 0
    ? `<div class="status-box" style="padding:24px;font-size:13px;">Sem not脙颅cias nessa busca.</div>`
    : filtered.map(a => renderArticle(a)).join('');

  return `
    <section class="sector-section" data-sector="${sector.id}">
      <div class="sector-header">
        <div class="sector-dot" style="background:${sector.color}"></div>
        <span class="sector-title">${sector.emoji} ${sector.name}</span>
        <span class="sector-count">${filtered.length}</span>
      </div>
      <div class="news-list">${itemsHtml}</div>
    </section>`;
}

function renderArticle(a) {
  const timeAgo = getTimeAgo(a.pubDate);
  return `
    <a class="news-item" href="${escHtml(a.link)}" target="_blank" rel="noopener">
      <span class="news-bullet">芒聙垄</span>
      <div class="news-body">
        <div class="news-title">${escHtml(a.title)}</div>
        <div class="news-meta">
          <span class="source-badge" style="background:${a.sourceColor}">${escHtml(a.sourceShort)}</span>
          <span class="time-tag">${timeAgo}</span>
        </div>
      </div>
    </a>`;
}

/* 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬

   芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬 */
function switchTab(sector) {
  currentSector = sector;
  document.querySelectorAll('.tab-btn').forEach(t =>
    t.classList.toggle('active', t.dataset.sector === sector));
  renderNews();
}

function switchTimeRange(days) {
  currentRange = days;
  document.querySelectorAll('.timefilter-btn').forEach(b =>
    b.classList.toggle('active', Number(b.dataset.range) === days));
  renderNews();
}

function getFilteredArticles() {
  if (currentRange === 0) return allArticles;
  const cutoff = Date.now() - currentRange * 86400000;
  return allArticles.filter(a => a.pubDate.getTime() > cutoff);
}

function filterSearch() {
  renderNews();
}

function getTimeAgo(date) {
  const diff = Date.now() - date.getTime();
  if (isNaN(diff) || diff < 0) return '';
  const min = Math.floor(diff / 60000);
  if (min < 1)  return 'agora';
  if (min < 60) return `h脙隆 ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24)   return `h脙隆 ${h}h`;
  const d = Math.floor(h / 24);
  return `h脙隆 ${d}d`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function openDigest() {
  const modal = document.getElementById('modal-overlay');
  modal.classList.remove('hidden');
  document.getElementById('digest-content').textContent = buildDigestText();
}
function closeDigest() {
  document.getElementById('modal-overlay').classList.add('hidden');
}
function closeDigestOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeDigest();
}

function buildDigestText() {
  const today = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  let txt = `Ita脙潞 BBA | Transportation & Capital Goods\n`;
  txt += `冒聼聯掳 Not脙颅cias 芒聙聰 ${today}\n`;
  txt += `${'芒聰聙'.repeat(50)}\n\n`;

  for (const sector of SECTORS) {
    const items = allArticles.filter(a => a.sectors.includes(sector.id)).slice(0, 8);
    if (items.length === 0) continue;
    txt += `${sector.emoji} ${sector.name.toUpperCase()}\n\n`;
    for (const a of items) {
      txt += `- ${a.title} (${a.sourceName})\n`;
      txt += `  ${a.link}\n\n`;
    }
  }
  txt += `\nGerado automaticamente via TransCap News Dashboard`;
  return txt;
}

function copyDigest() {
  const text = document.getElementById('digest-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '芒聹聟 Copiado!';
    setTimeout(() => btn.textContent = '冒聼聯聥 Copiar', 2000);
  });
}

function sendEmailDigest() {
  const subject = encodeURIComponent(`TransCap News 芒聙聰 ${new Date().toLocaleDateString('pt-BR')}`);
  const body    = encodeURIComponent(document.getElementById('digest-content').textContent);
  window.open(`mailto:${CONFIG.digestEmail}?subject=${subject}&body=${body}`, '_blank');
}
